<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChispezaWifi - Portal de Pagos</title>
    <style>
        /* Estilos Base y Estructura */
        body { font-family: 'Arial', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 380px; overflow: hidden; text-align: center; }
        .header-banner { background-color: #003399; padding: 20px; color: white; }
        .content-body { padding: 25px; }
        
        /* Inputs y Botones */
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #ff6600; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #e65c00; }

        /* Animación de Carga */
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #ff6600; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loading-screen p { font-size: 0.85rem; color: #003399; font-weight: bold; }

        /* Interfaz Bancaria (Lo que faltaba) */
        .user-summary { text-align: left; margin-bottom: 20px; font-size: 0.9rem; color: #444; }
        .user-summary strong { color: #003399; }
        
        .balance-card { background: linear-gradient(135deg, #003399 0%, #00256e 100%); color: white; padding: 20px; border-radius: 12px; text-align: left; margin-bottom: 20px; box-shadow: 0 4px 12px rgba(0,51,153,0.3); }
        .balance-card .amount { font-size: 2.2rem; font-weight: bold; margin: 5px 0; }
        .due-date { font-size: 0.75rem; background: rgba(255,255,255,0.2); display: inline-block; padding: 3px 10px; border-radius: 15px; }

        .history-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; text-align: left; margin-top: 10px; }
        .history-table td { padding: 10px 0; border-bottom: 1px solid #eee; }
        .negative { color: #d9534f; font-weight: bold; text-align: right; }
        
        #timer { color: #d9534f; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-banner">
            <h2>ChispezaWifi ⚡</h2>
        </div>
        <div class="content-body">
            
            <div id="login-section">
                <h3 id="timer"></h3>
                <p style="font-size: 0.9rem; color: #666;">Bienvenido al portal de clientes</p>
                <input type="text" id="rut" placeholder="RUT (Ej: 12345678-9)">
                <input type="password" id="pass" placeholder="Contraseña">

                <div id="loading-screen" style="display: none;">
                    <div class="spinner"></div>
                    <p>Validando credenciales...</p>
                </div>

                <button id="btn-ingresar" onclick="simularLogin()">INGRESAR</button>
                <p id="error-msg" style="color:red; font-size:0.8rem;"></p>
            </div>

            <div id="payment-section" style="display: none;">
                <div class="user-summary">
                    <p>Hola, <strong id="user-name">Usuario Invitado</strong></p>
                    <span id="user-rut-display" style="color:#666;">RUT: 12.345.678-9</span>
                </div>
                
                <div class="balance-card">
                    <span style="font-size:0.8rem; opacity: 0.9;">Monto Total a Pagar</span>
                    <div class="amount">$75.000</div>
                    <span class="due-date">Próximo vencimiento: 05 Mayo</span>
                </div>

                <h4 style="text-align: left; color: #003399; border-bottom: 1px solid #ff6600; padding-bottom: 5px;">Historial Reciente</h4>
                <table class="history-table">
                    <tr><td>10 Abr - Pago Webpay</td><td class="negative">-$75.000</td></tr>
                    <tr><td>05 Mar - Pago Webpay</td><td class="negative">-$75.000</td></tr>
                </table>

                <button onclick="alert('Redirigiendo a Webpay...')">PAGAR AHORA</button>
                <button onclick="location.reload()" style="background:#eee; color:#333; margin-top:10px;">Cerrar Sesión</button>
            </div>

        </div>
    </div>

    <script>
        // Simulación para que funcione en GitHub Pages sin el servidor Node.js
        function simularLogin() {
            const rut = document.getElementById('rut').value;
            const btn = document.getElementById('btn-ingresar');
            const loading = document.getElementById('loading-screen');
            const error = document.getElementById('error-msg');

            if (rut.length < 8) {
                error.innerText = "Por favor, ingresa un RUT válido.";
                return;
            }

            btn.style.display = "none";
            loading.style.display = "block";
            error.innerText = "";

            setTimeout(() => {
                loading.style.display = "none";
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('payment-section').style.display = 'block';
                document.getElementById('user-rut-display').innerText = `RUT: ${rut}`;
            }, 1500);
        }
    </script>
</body>
</html>
